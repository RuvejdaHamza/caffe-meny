<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coffee QR Menu</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOADER -->
<div id="loader">
    <div class="spinner"></div>
    <p>Loading menu...</p>
</div>

<!-- HERO -->
<div class="hero">
    <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93" class="hero-logo">
    <h1>Coffee House</h1>
    <p>Fresh coffee & drinks – scan & enjoy</p>
</div>

<!-- NAVBAR -->
<nav class="navbar">
    <a href="#kafe">Kafe</a>
    <a href="#pije">Pije</a>
    <a href="#lengje">Lëngje</a>
    <a href="#uje">Ujë</a>
</nav>

<!-- KAFE 3D -->
<section id="kafe">
<h2>Kafet</h2>

<div class="coffee-grid">

    <div class="coffee-circle">
        <div class="left" style="background-image:url('https://images.unsplash.com/photo-1511920170033-f8396924c348')"></div>
        <div class="right">
            <h3>Espresso</h3>
            <p>1.50€</p>
        </div>
    </div>

    <div class="coffee-circle">
        <div class="left" style="background-image:url('https://images.unsplash.com/photo-1509042239860-f550ce710b93')"></div>
        <div class="right">
            <h3>Macchiato</h3>
            <p>1.50€</p>
        </div>
    </div>

    <div class="coffee-circle">
        <div class="left" style="background-image:url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085')"></div>
        <div class="right">
            <h3>Cappuccino</h3>
            <p>1.80€</p>
        </div>
    </div>

    <div class="coffee-circle">
        <div class="left" style="background-image:url('https://images.unsplash.com/photo-1461023058943-07fcbe16d735')"></div>
        <div class="right">
            <h3>Double Espresso</h3>
            <p>2.50€</p>
        </div>
    </div>

</div>
</section>

<!-- PIJE -->
<section id="pije">
<h2>Pijet</h2>

<div class="drink-grid">

    <div class="drink-card">
        <img src="https://images.unsplash.com/photo-1581006852262-e4307cf6283a">
        <h3>Coca Cola</h3>
        <p>1.50€</p>
    </div>

    <div class="drink-card">
        <img src="https://images.unsplash.com/photo-1629203851122-3726ecdf080e">
        <h3>Fanta</h3>
        <p>1.50€</p>
    </div>

    <div class="drink-card">
        <img src="https://images.unsplash.com/photo-1581636625402-29b2a704ef13">
        <h3>Sprite</h3>
        <p>1.50€</p>
    </div>

</div>
</section>

<!-- LËNGJE -->
<section id="lengje">
<h2>Lëngje</h2>

<div class="drink-grid">
    <div class="drink-card">
        <img src="https://images.unsplash.com/photo-1600271886742-f049cd5bbaaa">
        <h3>Portokall</h3>
        <p>1.80€</p>
    </div>
</div>
</section>

<!-- UJË -->
<section id="uje">
<h2>Ujë</h2>

<div class="drink-grid">
    <div class="drink-card">
        <img src="https://images.unsplash.com/photo-1523362628745-0c100150b504">
        <h3>Ujë Natyral</h3>
        <p>1.00€</p>
    </div>
</div>
</section>

<!-- SCRIPT -->
<script>
window.addEventListener("load", function () {
    const loader = document.getElementById("loader");

    setTimeout(() => {
        loader.style.opacity = "0";
        loader.style.transition = "0.6s ease";

        setTimeout(() => {
            loader.style.display = "none";
        }, 600);
    }, 1200);
});
</script>

</body>
</html>
